name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Fast static checks — run on every push/PR.
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "npm install failed (attempt $i), cleaning cache and retrying..."
            npm cache clean --force || true
            sleep 10
          done
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  # Unit tests across all three target platforms so we catch
  # platform-specific regressions (path separators, shell detection, node-pty).
  unit:
    needs: static
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "npm install failed (attempt $i), cleaning cache and retrying..."
            npm cache clean --force || true
            sleep 10
          done
      # Coverage gates run on Windows only. src/main has ~19
      # `process.platform === 'win32'` checks whose win32 side never
      # executes on Linux/macOS, so each platform lands at a slightly
      # different coverage number. Gating on one platform keeps the
      # 90/85 thresholds meaningful instead of flapping on ~1% drift.
      # Ubuntu/macOS still run every test — they catch platform-specific
      # regressions (path separators, shell detection, node-pty), just
      # without the coverage denominator.
      - name: Unit tests (with coverage gates)
        if: matrix.os == 'windows-latest'
        run: npx vitest run --coverage --retry=2 --reporter=verbose --reporter=json --outputFile.json=test-output.json
      - name: Unit tests
        if: matrix.os != 'windows-latest'
        run: npx vitest run --retry=2 --reporter=verbose --reporter=json --outputFile.json=test-output.json
      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-output-${{ matrix.os }}
          path: |
            test-output.json
            coverage/
          retention-days: 7

  # Packaging regression guard — builds a REAL unpacked app (no installer,
  # no signing, ~1 min) and asserts the MCP stdio adapter was shipped.
  #
  # Why this exists: v1.11.5 shipped a broken installer where Claude Code's
  # ~/.mcp.json pointed at an adapter file that did not physically exist.
  # No unit test could catch it because the unit tests pin package.json
  # config but not electron-builder's actual output. This job runs
  # electron-builder --dir on Linux (cheapest), then runs our verifier
  # against the produced dist-electron-builder/linux-unpacked tree. If
  # the adapter is not shipped, this fails the PR.
  package-verify:
    needs: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "npm install failed (attempt $i), cleaning cache and retrying..."
            npm cache clean --force || true
            sleep 10
          done
      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools
      - name: Download bundled embedding model
        run: bash scripts/download-embedding-model.sh
      # Un-gates semantic recall in CI: with the real model now on disk
      # (resources/models), the skipIf(!hasBundledModel) tests RUN here and prove
      # real-embedding cross-agent recall — the plain unit jobs lack the model.
      - name: Real-embedding semantic recall (model present)
        run: npx vitest run tests/electron/localEmbedder.test.ts tests/electron/bertTokenizer.test.ts tests/electron/memorySemanticRecall.test.ts --reporter=verbose
      - name: Build app
        run: npx electron-vite build
      - name: Package (unpacked, no installer, no signing)
        run: npx electron-builder --dir --publish never
      - name: Verify MCP adapter shipped in packaged resources
        run: node scripts/verifyPackagedResources.cjs dist-electron-builder/linux-unpacked
      - name: Verify embedding model + onnxruntime-web WASM bundled
        run: node scripts/verifyPackagedResources.cjs --model dist-electron-builder/linux-unpacked
      - name: Upload unpacked output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dist-electron-builder-linux
          path: dist-electron-builder/linux-unpacked/
          retention-days: 3

  # E2E smoke — Linux is the primary runner (xvfb keeps it cheap and
  # deterministic). macOS piggybacks on chrome-smoke only (see e2e-smoke-macos
  # below) so we can catch Darwin-specific regressions — node-pty native
  # build drift, shell-detection path mismatches, Electron-on-arm64 quirks
  # — without blowing CI minutes on the full suite.
  e2e-smoke:
    needs: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "npm install failed (attempt $i), cleaning cache and retrying..."
            npm cache clean --force || true
            sleep 10
          done
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Smoke-click every sidebar button
        run: xvfb-run --auto-servernum npx playwright test e2e/chrome-smoke.spec.ts
      # Screens-show-results gate: regression guard against "screen opens
      # but shows nothing" (the v1.11.5 / v1.11.6 silent-spinner symptom).
      # Seeds real data into store + IPC, asserts visible text renders.
      - name: UI screens show visible results
        run: xvfb-run --auto-servernum npx playwright test e2e/ui-screens-show-results.spec.ts
      # Plugin .mcp.json variant: guards the plugin-discovery path that
      # Claude Code uses when NO --mcp-config flag is passed. Catches
      # the v1.11.5 class of bug (adapter args[0] points at a missing file)
      # and ensures the mcpServers wrapper shape is preserved.
      - name: Plugin .mcp.json shape and adapter path
        run: xvfb-run --auto-servernum npx playwright test e2e/plugin-mcp-config.spec.ts
      # Context-pressure gate: proves the live status-bar pill renders, escalates
      # (warn -> critical), and hides — driven through the REAL agent-event bus in the
      # running app (publish -> IPC push -> hook -> computePressure -> component), not
      # just unit mocks. Closes the "does it actually show up live" gap.
      - name: Context-pressure indicator renders + escalates
        run: xvfb-run --auto-servernum npx playwright test e2e/context-pressure.spec.ts
      # Compaction re-primer gate: proves the FULL flow in the running app — a
      # "Compacting conversation" marker in terminal output triggers a real
      # bracketed-paste re-prime carrying seeded memory back into the terminal, and
      # the cooldown prevents a second paste. Covers the TerminalPane wiring + real
      # injectAutoPrimer that unit tests can't reach.
      - name: Compaction re-primer pastes recalled memory
        run: xvfb-run --auto-servernum npx playwright test e2e/compaction-reprime.spec.ts
      # Report-a-Problem gate: proves the Help-modal entry point, the
      # diagnostics IPC round-trip, and the openExternal handler are all
      # wired. Stubs shell.openExternal so no real browser launches.
      - name: Report-a-Problem flow
        run: xvfb-run --auto-servernum npx playwright test e2e/report-problem.spec.ts
      # Memory panel gate: proves the persistent-memory UI opens (Ctrl+Shift+M),
      # exposes its controls, is discoverable via the Command Palette, and the
      # inject-primer path responds — in the real Electron app.
      - name: Memory panel flow
        run: xvfb-run --auto-servernum npx playwright test e2e/memory-panel.spec.ts
      # Cross-agent recall gate: proves one agent's memory_write is retrievable
      # by another agent via memory_search over the REAL MCP wire (HTTP + auth +
      # dispatch + shared store) in the running app.
      - name: Cross-agent memory recall over MCP
        run: xvfb-run --auto-servernum npx playwright test e2e/memory-cross-agent-recall.spec.ts
      # Voice capture gate: proves the REAL getUserMedia -> AudioContext capture
      # path works in the running app, using Chromium's fake audio device and a
      # network-stubbed cloud STT engine (no model load). Closes the "does the
      # mic actually work end-to-end" gap the jsdom unit suite can't reach.
      - name: Voice capture from fake audio device
        run: xvfb-run --auto-servernum npx playwright test e2e/voice-capture.spec.ts
      # Voice DEAD-ZONE gate: feed steady background hum (the exact audio that made
      # Whisper emit "the"/" you") as the mic and prove the app GATES it — shows a
      # notice and injects NOTHING. Uses a committed noise fixture; needs no model
      # (the speech/noise gate runs in the renderer first). The in-app proof of the fix.
      - name: Voice gates steady background noise (no phantom transcript)
        if: ${{ !cancelled() }}
        run: xvfb-run --auto-servernum npx playwright test e2e/voice-noise-gate.spec.ts
      # Clipboard gate: proves the terminal right-click menu actually COPIES the
      # selection to the REAL OS clipboard (plain + code-block) and PASTES from it
      # (the recurring "copy/paste does nothing" report) — end-to-end in real Electron.
      - name: Terminal right-click copy + paste (real clipboard)
        if: ${{ !cancelled() }}
        run: xvfb-run --auto-servernum npx playwright test e2e/clipboard-paste.spec.ts
      # Terminal-focus gate: proves switching terminals (Alt+<n> / clicking a tab),
      # incl. re-selecting the already-active one, lands the caret on that
      # terminal's xterm input — the "input is always ready" promise (focusNonce).
      - name: Terminal switch focuses the input line
        if: ${{ !cancelled() }}
        run: xvfb-run --auto-servernum npx playwright test e2e/terminal-focus.spec.ts
      # In-terminal find gate: Ctrl+Shift+F opens the find bar and the real
      # SearchAddon finds a keyword that has scrolled into the scrollback.
      - name: In-terminal find bar searches scrollback
        if: ${{ !cancelled() }}
        run: xvfb-run --auto-servernum npx playwright test e2e/terminal-search.spec.ts
      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # macOS e2e smoke: Darwin runner exercising the core boot + first-run
  # flows. Two specs intentionally:
  #   - chrome-smoke: clicks every sidebar button, catches hooks/render
  #     regressions and node-pty rebuild drift.
  #   - first-run-zero-agents: proves a brand-new macOS user — no Claude,
  #     no Codex, no Gemini, no Qwen — can still boot the app and open a
  #     terminal. This is the path a first-time TestFlight reviewer hits.
  #
  # Required on main as of v1.11.15 — first green seen on 0342333.
  # If macOS starts flaking after a runner-image bump or similar, flip
  # continue-on-error back to true while we stabilize rather than
  # papering over a real regression.
  e2e-smoke-macos:
    needs: static
    runs-on: macos-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "npm install failed (attempt $i), cleaning cache and retrying..."
            npm cache clean --force || true
            sleep 10
          done
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Smoke-click every sidebar button (macOS)
        run: npx playwright test e2e/chrome-smoke.spec.ts
      - name: First-run with zero AI agents installed (macOS)
        run: npx playwright test e2e/first-run-zero-agents.spec.ts
      - name: Report-a-Problem flow (macOS)
        run: npx playwright test e2e/report-problem.spec.ts
      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-macos
          path: test-results/
          retention-days: 7
