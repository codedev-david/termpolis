name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Fast static checks — run on every push/PR.
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "npm install failed (attempt $i), cleaning cache and retrying..."
            npm cache clean --force || true
            sleep 10
          done
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  # Unit tests across all three target platforms so we catch
  # platform-specific regressions (path separators, shell detection, node-pty).
  unit:
    needs: static
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "npm install failed (attempt $i), cleaning cache and retrying..."
            npm cache clean --force || true
            sleep 10
          done
      # Coverage gates run on Windows only. src/main has ~19
      # `process.platform === 'win32'` checks whose win32 side never
      # executes on Linux/macOS, so each platform lands at a slightly
      # different coverage number. Gating on one platform keeps the
      # 90/85 thresholds meaningful instead of flapping on ~1% drift.
      # Ubuntu/macOS still run every test — they catch platform-specific
      # regressions (path separators, shell detection, node-pty), just
      # without the coverage denominator.
      - name: Unit tests (with coverage gates)
        if: matrix.os == 'windows-latest'
        run: npx vitest run --coverage --reporter=verbose --reporter=json --outputFile.json=test-output.json
      - name: Unit tests
        if: matrix.os != 'windows-latest'
        run: npx vitest run --reporter=verbose --reporter=json --outputFile.json=test-output.json
      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-output-${{ matrix.os }}
          path: |
            test-output.json
            coverage/
          retention-days: 7

  # Packaging regression guard — builds a REAL unpacked app (no installer,
  # no signing, ~1 min) and asserts the MCP stdio adapter was shipped.
  #
  # Why this exists: v1.11.5 shipped a broken installer where Claude Code's
  # ~/.mcp.json pointed at an adapter file that did not physically exist.
  # No unit test could catch it because the unit tests pin package.json
  # config but not electron-builder's actual output. This job runs
  # electron-builder --dir on Linux (cheapest), then runs our verifier
  # against the produced dist-electron-builder/linux-unpacked tree. If
  # the adapter is not shipped, this fails the PR.
  package-verify:
    needs: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "npm install failed (attempt $i), cleaning cache and retrying..."
            npm cache clean --force || true
            sleep 10
          done
      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools
      - name: Build app
        run: npx electron-vite build
      - name: Package (unpacked, no installer, no signing)
        run: npx electron-builder --dir --publish never
      - name: Verify MCP adapter shipped in packaged resources
        run: node scripts/verifyPackagedResources.cjs dist-electron-builder/linux-unpacked
      - name: Upload unpacked output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dist-electron-builder-linux
          path: dist-electron-builder/linux-unpacked/
          retention-days: 3

  # E2E smoke — one platform only, because Electron + Playwright on
  # multiple matrix runners is expensive and brittle. Linux + xvfb keeps
  # it cheap and deterministic.
  e2e-smoke:
    needs: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "npm install failed (attempt $i), cleaning cache and retrying..."
            npm cache clean --force || true
            sleep 10
          done
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Smoke-click every sidebar button
        run: xvfb-run --auto-servernum npx playwright test e2e/chrome-smoke.spec.ts
      # Screens-show-results gate: regression guard against "screen opens
      # but shows nothing" (the v1.11.5 / v1.11.6 silent-spinner symptom).
      # Seeds real data into store + IPC, asserts visible text renders.
      - name: UI screens show visible results
        run: xvfb-run --auto-servernum npx playwright test e2e/ui-screens-show-results.spec.ts
      # Plugin .mcp.json variant: guards the plugin-discovery path that
      # Claude Code uses when NO --mcp-config flag is passed. Catches
      # the v1.11.5 class of bug (adapter args[0] points at a missing file)
      # and ensures the mcpServers wrapper shape is preserved.
      - name: Plugin .mcp.json shape and adapter path
        run: xvfb-run --auto-servernum npx playwright test e2e/plugin-mcp-config.spec.ts
      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
