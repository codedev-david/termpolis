name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx vitest run

  e2e-tests:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx electron-vite build

      - run: npx playwright test
        env:
          TERMPOLIS_TEST_AGENTS: '1'
          TERMPOLIS_TEST_TIMING: '1'

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-results-${{ matrix.os }}
          path: |
            e2e/screenshots/
            test-results/
