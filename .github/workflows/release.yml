name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npx vitest run

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install && break
            echo "npm install failed (attempt $i), cleaning cache and retrying..."
            npm cache clean --force || true
            sleep 10
          done

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Download bundled CLI tools
        run: bash scripts/download-tools.sh
        continue-on-error: true

      - name: Download bundled embedding model
        run: bash scripts/download-embedding-model.sh
        continue-on-error: true

      - name: Import Apple certificate
        if: matrix.platform == 'mac'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/apple-cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build app
        run: npx electron-vite build
        env:
          # Crash reporting + light usage telemetry. Both gated by an in-app
          # opt-in (see src/main/telemetry.ts); even with the DSN baked in,
          # nothing leaves the user's machine until they consent. Empty when
          # the secret isn't set, which makes Sentry init a no-op.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Fix spawn-helper permissions (macOS)
        if: matrix.platform == 'mac'
        run: |
          # node-pty's spawn-helper needs execute permission for posix_spawnp
          find node_modules/node-pty -name "spawn-helper" -type f -exec chmod 755 {} \; -print

      # macOS + Linux: unchanged single-shot package.
      - name: Package (macOS + Linux)
        if: matrix.platform != 'win'
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Windows is built in TWO phases so we can code-sign the INNER app
      # executable (win-unpacked/Termpolis.exe) — the binary Windows Defender
      # actually scans and quarantines. electron-builder only ever signs the
      # OUTER installer, so the unpacked Termpolis.exe shipped UNSIGNED and
      # tripped Defender's cloud-ML C2/RAT classifier (Trojan:Win32/Cinjo.O!cl).
      # Phases:
      #   1. build only the unpacked dir,
      #   2. sign win-unpacked/Termpolis.exe,
      #   3. build the NSIS installer FROM the now-signed dir.
      # The outer installer is still signed by the existing step further down,
      # and latest.yml's sha512 is recomputed after that — so signing the inner
      # exe (which changes the installer bytes) needs no extra metadata fixup.
      - name: Package — unpacked dir only (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --dir --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Non-fatal by design — same rationale as the installer-signing step:
      # an eSigner hiccup (SSL.com quota/OAuth/TOTP/outage) must NEVER abort
      # the release. If this fails we pack the UNSIGNED inner exe (exactly
      # today's behaviour) rather than stranding the whole Windows build.
      # malware_block:false so SSL.com's own pre-sign scan won't refuse to sign
      # the very AI-agent network→shell pattern Defender flags.
      - name: Sign inner Termpolis.exe (Windows)
        id: sign-inner-win
        if: matrix.platform == 'win'
        continue-on-error: true
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/dist-electron-builder/win-unpacked/Termpolis.exe
          malware_block: false
          override: true

      - name: Note inner-exe signing result (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          if [ "${{ steps.sign-inner-win.outcome }}" = "success" ]; then
            echo "Inner Termpolis.exe signed successfully."
          else
            echo "::warning::Inner Termpolis.exe was NOT signed (eSigner outcome: ${{ steps.sign-inner-win.outcome }}). Packing it unsigned (status quo); the outer installer is still signed below. Defender may keep flagging the unpacked exe until inner-exe signing succeeds on a later release."
          fi

      - name: Package — NSIS installer from signed dir (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win nsis --prepackaged dist-electron-builder/win-unpacked --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Belt-and-suspenders: the afterPack hook (scripts/afterPack.cjs)
      # already verifies this during the build, but we also verify the
      # final packaged output BEFORE we upload anything to GitHub.
      # If the adapter is missing, we fail the job here — no broken
      # installer ever reaches users.
      - name: Verify MCP adapter in packaged output (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: node scripts/verifyPackagedResources.cjs dist-electron-builder/win-unpacked
      - name: Verify MCP adapter in packaged output (Linux)
        if: matrix.platform == 'linux'
        run: node scripts/verifyPackagedResources.cjs dist-electron-builder/linux-unpacked
      - name: Verify MCP adapter in packaged output (macOS x64)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          # electron-builder produces mac/ and mac-arm64/ for universal builds.
          for d in dist-electron-builder/mac dist-electron-builder/mac-arm64; do
            if [ -d "$d" ]; then
              echo "Verifying $d..."
              node scripts/verifyPackagedResources.cjs "$d"
            fi
          done

      - name: Notarize macOS DMGs
        if: matrix.platform == 'mac'
        timeout-minutes: 30
        run: |
          for DMG in dist-electron-builder/*.dmg; do
            echo "Notarizing: $DMG"

            # Submit and capture the submission ID
            SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --output-format json 2>&1) || true
            echo "$SUBMIT_OUTPUT"
            SUB_ID=$(echo "$SUBMIT_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null || echo "")

            if [ -z "$SUB_ID" ]; then
              echo "Failed to get submission ID, trying with --wait directly"
              xcrun notarytool submit "$DMG" \
                --apple-id "${{ secrets.APPLE_ID }}" \
                --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
                --team-id "${{ secrets.APPLE_TEAM_ID }}" \
                --wait --timeout 20m
            else
              echo "Submission ID: $SUB_ID"
              # Poll with retries to handle transient network drops
              for i in 1 2 3; do
                echo "Waiting for notarization (attempt $i)..."
                xcrun notarytool wait "$SUB_ID" \
                  --apple-id "${{ secrets.APPLE_ID }}" \
                  --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
                  --team-id "${{ secrets.APPLE_TEAM_ID }}" \
                  --timeout 10m && break
                echo "Wait interrupted, retrying in 30s..."
                sleep 30
              done

              # Check final status
              xcrun notarytool info "$SUB_ID" \
                --apple-id "${{ secrets.APPLE_ID }}" \
                --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
                --team-id "${{ secrets.APPLE_TEAM_ID }}"
            fi

            xcrun stapler staple "$DMG"
            echo "Notarization complete for $DMG"
          done

      # `xcrun stapler staple` writes the notarization ticket into each .dmg
      # AFTER electron-builder wrote latest-mac.yml, so the recorded SHA512
      # + size are stale by ~2KB per dmg. Recompute them now or
      # validate-update-metadata fails (and Mac auto-update breaks).
      - name: Refresh latest-mac.yml after notarization (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          for DMG in dist-electron-builder/*.dmg; do
            echo "Refreshing latest-mac.yml entry for $DMG"
            node scripts/refreshLatestYml.cjs --installer "$DMG" --yml dist-electron-builder/latest-mac.yml
          done

      - name: Find Windows installer
        if: matrix.platform == 'win'
        id: find-exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "dist-electron-builder" -Filter "*.exe" | Select-Object -First 1
          echo "EXE_PATH=$($exe.FullName)" | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT
          echo "Found installer: $($exe.FullName)"

      # Non-fatal by design: a signing hiccup (SSL.com eSigner quota exhaustion,
      # OAuth/TOTP blip, service outage) must NEVER abort the whole release —
      # that strands the macOS/Linux artifacts and skips the aggregate jobs.
      # If this step fails we publish the functional UNSIGNED installer below
      # (with a consistent latest.yml) and signing resumes on the next release.
      # Defender pass-through is reputation-based, not EV-dependent, so an
      # occasional unsigned build still installs and runs.
      - name: Sign Windows installer
        id: sign-win
        if: matrix.platform == 'win'
        continue-on-error: true
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          file_path: ${{ steps.find-exe.outputs.EXE_PATH }}
          malware_block: false
          override: true

      - name: Note Windows signing result
        if: matrix.platform == 'win'
        shell: bash
        run: |
          if [ "${{ steps.sign-win.outcome }}" = "success" ]; then
            echo "Windows installer signed successfully."
          else
            echo "::warning::Windows installer was NOT signed (eSigner outcome: ${{ steps.sign-win.outcome }}). Publishing the functional unsigned installer so the release is not blocked. This is almost certainly the SSL.com signing quota being exhausted; signing resumes automatically on the next release once the quota resets."
          fi

      # Code-signing modifies the .exe in place, so the SHA512 in latest.yml
      # (written by electron-builder before signing) is now stale. Recompute
      # it against the signed binary or auto-update will fail with
      # "sha512 checksum mismatch" on every install.
      - name: Refresh latest.yml after signing (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: node scripts/refreshLatestYml.cjs --installer "${{ steps.find-exe.outputs.EXE_PATH }}" --yml dist-electron-builder/latest.yml

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          files: |
            dist-electron-builder/*.exe
            dist-electron-builder/*.dmg
            dist-electron-builder/*.zip
            dist-electron-builder/*.AppImage
            dist-electron-builder/*.deb
            dist-electron-builder/*.blockmap
            dist-electron-builder/latest*.yml

      - name: Upload installer to termpolis.com
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          # Copy the .exe plus a stable-name copy for the Microsoft Store
          New-Item -ItemType Directory -Path "ftp-staging" -Force
          $exe = Get-ChildItem -Path "dist-electron-builder" -Filter "*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "ftp-staging/"
          Copy-Item $exe.FullName "ftp-staging/Termpolis-Setup-Latest.exe"

      # Mirror the installer to termpolis.com/downloads. This is a NON-CRITICAL
      # convenience mirror — GitHub Releases (uploaded above) is the source of
      # truth that electron-updater auto-update reads — so a transient transfer
      # failure must never mark the whole release run as failed.
      #
      # Uses curl over EXPLICIT FTPS (FTP + AUTH TLS; --ssl-reqd refuses to fall
      # back to plaintext) with retries, which fixes the SamKirkland action's
      # flaky control-socket timeouts. Credentials are passed via env, not the
      # command line. (SFTP is a cleaner transport still; switching needs the host
      # to expose SSH/SFTP + an SSH key secret — tracked as a follow-up.)
      - name: Mirror installer to termpolis.com/downloads (FTPS, retried)
        if: matrix.platform == 'win'
        continue-on-error: true
        shell: pwsh
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Engineered to ALWAYS exit 0 so this non-critical mirror can never
          # red-flag an otherwise-good release; any failure surfaces only as a
          # ::warning::. GitHub Releases stays the source of truth that
          # electron-updater reads for auto-update.
          #
          # We try full certificate verification FIRST, then fall back to TLS
          # WITHOUT the cert-name check: GoDaddy's FTPS endpoint currently
          # presents a certificate whose principal name doesn't match $FTP_HOST
          # (Windows Schannel error SEC_E_WRONG_PRINCIPAL / curl exit 60).
          # --insecure keeps the channel TLS-encrypted (credentials never cross
          # the wire in plaintext); it only skips the name check. When the host
          # certificate is corrected, the verified path resumes automatically.
          $ErrorActionPreference = 'Continue'
          # Don't let a native non-zero exit (curl) throw before we inspect it:
          # PowerShell 7.3+ would otherwise terminate the step on curl exit 60.
          $PSNativeCommandUseErrorActionPreference = $false
          $base = @(
            '--ssl-reqd', '--fail', '--silent',
            '--retry', '6', '--retry-delay', '5', '--retry-all-errors',
            '--user', "${env:FTP_USERNAME}:${env:FTP_PASSWORD}"
          )
          $failed = 0
          foreach ($f in (Get-ChildItem ftp-staging -File)) {
            $dest = "ftp://${env:FTP_HOST}/downloads/"
            Write-Host "Uploading $($f.Name) via FTPS (verified) ..."
            curl.exe @base -T "$($f.FullName)" "$dest"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Verified FTPS failed (curl exit $LASTEXITCODE); retrying with TLS but no cert-name check ..."
              curl.exe @base --insecure --show-error -T "$($f.FullName)" "$dest"
            }
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::warning::Could not mirror $($f.Name) to termpolis.com/downloads (curl exit $LASTEXITCODE). GitHub Releases still has the build; the website link may be stale until the next successful mirror."
              $failed++
            } else {
              Write-Host "Mirrored $($f.Name) successfully."
            }
          }
          if ($failed -eq 0) { Write-Host "All installer files mirrored to termpolis.com/downloads." }
          exit 0

      - name: Publish to Chocolatey
        if: matrix.platform == 'win'
        continue-on-error: true
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          $version = (node -p "require('./package.json').version")
          $exe = Get-ChildItem -Path "dist-electron-builder" -Filter "*.exe" | Select-Object -First 1
          $hash = (Get-FileHash -Path $exe.FullName -Algorithm SHA256).Hash

          # Update install script with correct URL and hash
          $installScript = Get-Content "packaging/chocolatey/tools/chocolateyinstall.ps1" -Raw
          $installScript = $installScript -replace 'REPLACE_WITH_SHA256', $hash
          $installScript = $installScript -replace 'download/v[\d.]+/', "download/v$version/"
          $installScript = $installScript -replace 'Termpolis\.Setup\.[\d.]+\.exe', "Termpolis.Setup.$version.exe"
          Set-Content "packaging/chocolatey/tools/chocolateyinstall.ps1" $installScript

          # Update nuspec version and release notes URL
          $nuspec = Get-Content "packaging/chocolatey/termpolis.nuspec" -Raw
          $nuspec = $nuspec -replace '<version>.*</version>', "<version>$version</version>"
          $nuspec = $nuspec -replace '<releaseNotes>.*</releaseNotes>', "<releaseNotes>https://github.com/codedev-david/termpolis/releases/tag/v$version</releaseNotes>"
          Set-Content "packaging/chocolatey/termpolis.nuspec" $nuspec

          # Pack and push. Non-critical: GitHub Releases is the source of truth,
          # so a Chocolatey hiccup (moderation queue, push quota, transient 5xx)
          # must never red-flag the release — surface it as a ::warning:: and
          # exit 0 instead. The native-error guard keeps a non-zero choco exit
          # from throwing before we can downgrade it to a warning.
          $ErrorActionPreference = 'Continue'
          $PSNativeCommandUseErrorActionPreference = $false
          cd packaging/chocolatey
          choco pack
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::choco pack failed (exit $LASTEXITCODE); skipping Chocolatey publish for this release."
            exit 0
          }
          choco push "termpolis.$version.nupkg" --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::choco push failed (exit $LASTEXITCODE). GitHub Releases still has the build; the Chocolatey package will update on the next successful push."
          }
          exit 0

  # Auto-update metadata gate — runs AFTER all platform builds have
  # published their artifacts to the GitHub release. Hits the live URLs
  # electron-updater will later hit and verifies that every advertised
  # file is reachable, that sha512 digests aren't truncated, and that
  # the `version` field matches the tag. If any of those fails, the
  # release is effectively broken for auto-update even though installs
  # succeeded — so we flag the workflow red and page the maintainer
  # before users start trying to update.
  validate-update-metadata:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install --omit=optional --no-audit --no-fund
      # Give GitHub a beat to finalize asset uploads — the upload step
      # returns before CDN edges can serve the new assets consistently.
      - name: Wait for release CDN consistency
        run: sleep 30
      - name: Validate latest*.yml against live release
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BASE="https://github.com/codedev-david/termpolis/releases/download"
          node scripts/validateLatestYml.cjs --version "$VERSION" --base "$BASE"

  # Fires a repository_dispatch at codedev-david/homebrew-termpolis so that
  # tap rewrites Casks/termpolis.rb against the new tag's DMG sha256s. Gated
  # on validate-update-metadata so we only bump the tap when the release is
  # known-good. Will silently no-op until HOMEBREW_TAP_TOKEN is set.
  bump-homebrew-tap:
    needs: validate-update-metadata
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap bump"
            exit 0
          fi
          version="${GITHUB_REF_NAME#v}"
          gh api repos/codedev-david/homebrew-termpolis/dispatches \
            -f event_type=termpolis-release \
            -f "client_payload[version]=$version"
