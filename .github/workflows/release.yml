name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npx vitest run

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Download bundled CLI tools
        run: bash scripts/download-tools.sh
        continue-on-error: true

      - name: Install CodeSignTool (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.ssl.com/download/codesigntool-for-windows/" -OutFile "CodeSignTool.zip" -MaximumRedirection 10
          Expand-Archive -Path "CodeSignTool.zip" -DestinationPath "CodeSignTool" -Force
          Get-ChildItem -Path "CodeSignTool" -Recurse | Select-Object -First 20
          $cstBat = Get-ChildItem -Path "CodeSignTool" -Recurse -Filter "CodeSignTool.bat" | Select-Object -First 1
          if (-not $cstBat) {
            Write-Error "CodeSignTool.bat not found in extracted archive"
            exit 1
          }
          echo "$($cstBat.DirectoryName)" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
          Write-Host "CodeSignTool installed at: $($cstBat.FullName)"

      - name: Build app
        run: npx electron-vite build

      - name: Package
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
          SSL_COM_PASSWORD: ${{ secrets.SSL_COM_PASSWORD }}
          SSL_COM_TOTP_SECRET: ${{ secrets.SSL_COM_TOTP_SECRET }}
          SSL_COM_CREDENTIAL_ID: ${{ secrets.SSL_COM_CREDENTIAL_ID }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            dist-electron-builder/*.exe
            dist-electron-builder/*.dmg
            dist-electron-builder/*.AppImage
