name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npx vitest run

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Download bundled CLI tools
        run: bash scripts/download-tools.sh
        continue-on-error: true

      - name: Import Apple certificate
        if: matrix.platform == 'mac'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/apple-cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build app
        run: npx electron-vite build

      - name: Package (macOS with signing + notarization)
        if: matrix.platform == 'mac'
        run: npx electron-builder --publish never
        timeout-minutes: 30
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package (Windows/Linux)
        if: matrix.platform != 'mac'
        run: npx electron-builder --publish never
        timeout-minutes: 30
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notarize macOS DMGs
        if: matrix.platform == 'mac'
        continue-on-error: true
        timeout-minutes: 30
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for DMG in dist-electron-builder/*.dmg; do
            echo "=== Notarizing: $DMG ==="

            SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>&1) || true
            echo "$SUBMIT_OUTPUT"

            SUB_ID=$(echo "$SUBMIT_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null || echo "")

            if [ -z "$SUB_ID" ]; then
              echo "::warning::Failed to submit $DMG for notarization"
              continue
            fi

            echo "Submission ID: $SUB_ID — waiting for Apple..."
            xcrun notarytool wait "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --timeout 20m || true

            # Show the result
            xcrun notarytool info "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true

            # If notarization succeeded, show the log
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" 2>/dev/null || true

            echo "Stapling: $DMG"
            xcrun stapler staple "$DMG" || echo "::warning::Stapling failed for $DMG"

            echo "=== Done: $DMG ==="
          done

      - name: Find Windows installer
        if: matrix.platform == 'win'
        id: find-exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "dist-electron-builder" -Filter "*.exe" | Select-Object -First 1
          echo "EXE_PATH=$($exe.FullName)" | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT
          echo "Found installer: $($exe.FullName)"

      - name: Sign Windows installer
        if: matrix.platform == 'win'
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          file_path: ${{ steps.find-exe.outputs.EXE_PATH }}
          malware_block: false
          override: true

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          files: |
            dist-electron-builder/*.exe
            dist-electron-builder/*.dmg
            dist-electron-builder/*.AppImage

      - name: Upload installer to termpolis.com
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          # Copy the .exe plus a stable-name copy for the Microsoft Store
          New-Item -ItemType Directory -Path "ftp-staging" -Force
          $exe = Get-ChildItem -Path "dist-electron-builder" -Filter "*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "ftp-staging/"
          Copy-Item $exe.FullName "ftp-staging/Termpolis-Setup-Latest.exe"

      - name: FTP deploy to termpolis.com
        if: matrix.platform == 'win'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ftp-staging/
          server-dir: /downloads/
          dangerous-clean-slate: true

      - name: Publish to Chocolatey
        if: matrix.platform == 'win'
        continue-on-error: true
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          $version = (node -p "require('./package.json').version")
          $exe = Get-ChildItem -Path "dist-electron-builder" -Filter "*.exe" | Select-Object -First 1
          $hash = (Get-FileHash -Path $exe.FullName -Algorithm SHA256).Hash

          # Update install script with correct URL and hash
          $installScript = Get-Content "packaging/chocolatey/tools/chocolateyinstall.ps1" -Raw
          $installScript = $installScript -replace 'REPLACE_WITH_SHA256', $hash
          $installScript = $installScript -replace 'download/v[\d.]+/', "download/v$version/"
          $installScript = $installScript -replace 'Termpolis\.Setup\.[\d.]+\.exe', "Termpolis.Setup.$version.exe"
          Set-Content "packaging/chocolatey/tools/chocolateyinstall.ps1" $installScript

          # Update nuspec version and release notes URL
          $nuspec = Get-Content "packaging/chocolatey/termpolis.nuspec" -Raw
          $nuspec = $nuspec -replace '<version>.*</version>', "<version>$version</version>"
          $nuspec = $nuspec -replace '<releaseNotes>.*</releaseNotes>', "<releaseNotes>https://github.com/codedev-david/termpolis/releases/tag/v$version</releaseNotes>"
          Set-Content "packaging/chocolatey/termpolis.nuspec" $nuspec

          # Pack and push
          cd packaging/chocolatey
          choco pack
          choco push "termpolis.$version.nupkg" --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY
