name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npx vitest run

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Download bundled CLI tools
        run: bash scripts/download-tools.sh
        continue-on-error: true

      - name: Import Apple certificate
        if: matrix.platform == 'mac'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/apple-cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build app
        run: npx electron-vite build

      - name: Package
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Notarize macOS DMG
        if: matrix.platform == 'mac'
        run: |
          DMG=$(ls dist-electron-builder/*.dmg | head -1)
          echo "Notarizing: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple "$DMG"
          echo "Notarization complete"

      - name: Find Windows installer
        if: matrix.platform == 'win'
        id: find-exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "dist-electron-builder" -Filter "*.exe" | Select-Object -First 1
          echo "EXE_PATH=$($exe.FullName)" | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT
          echo "Found installer: $($exe.FullName)"

      - name: Sign Windows installer
        if: matrix.platform == 'win'
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          file_path: ${{ steps.find-exe.outputs.EXE_PATH }}
          malware_block: false
          override: true

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            dist-electron-builder/*.exe
            dist-electron-builder/*.dmg
            dist-electron-builder/*.AppImage

      - name: Publish to Chocolatey
        if: matrix.platform == 'win'
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          $version = (node -p "require('./package.json').version")
          $exe = Get-ChildItem -Path "dist-electron-builder" -Filter "*.exe" | Select-Object -First 1
          $hash = (Get-FileHash -Path $exe.FullName -Algorithm SHA256).Hash

          # Update install script with correct URL and hash
          $installScript = Get-Content "packaging/chocolatey/tools/chocolateyinstall.ps1" -Raw
          $installScript = $installScript -replace 'REPLACE_WITH_SHA256', $hash
          $installScript = $installScript -replace 'v1\.4\.1', "v$version"
          $installScript = $installScript -replace '1\.4\.1', $version
          Set-Content "packaging/chocolatey/tools/chocolateyinstall.ps1" $installScript

          # Update nuspec version
          $nuspec = Get-Content "packaging/chocolatey/termpolis.nuspec" -Raw
          $nuspec = $nuspec -replace '<version>.*</version>', "<version>$version</version>"
          $nuspec = $nuspec -replace 'v1\.4\.1', "v$version"
          Set-Content "packaging/chocolatey/termpolis.nuspec" $nuspec

          # Pack and push
          cd packaging/chocolatey
          choco pack
          choco push "termpolis.$version.nupkg" --source https://push.chocolatey.org/ --api-key $env:CHOCO_API_KEY
